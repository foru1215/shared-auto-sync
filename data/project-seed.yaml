meta:
  project_name: Career Transition 24-Month Plan
  owner: foru1215
  repo: shared-auto-sync
  start_date: '2026-03-14'
  end_date: '2028-03-31'
strategy:
  primary_goal: 制御盤営業 → 制御・設備 × AI 実務人材への転換（24か月）
  secondary_goals:
  - 第一種電気工事士 取得
  - 電験三種 科目合格以上
  - 制御基礎・PLC・図面読解の習得
  - Codex / Claude Code スペシャリスト化
  - 転職で見せられるポートフォリオ構築
  target_roles:
  - role: 生産技術（制御・電気寄り）
    priority: primary
    salary_range: 500-800万
  - role: 設備開発・設備設計
    priority: secondary
    salary_range: 500-900万
  - role: 電気設計・制御設計
    priority: fallback
    salary_range: 450-700万
  strengths:
  - 制御盤メーカーでの顧客折衝・仕様会話力
  - 発電機盤・ポンプ盤の業界土地勘
  - 営業としてのコミュニケーション力
  - AI ツール（Codex / Claude Code）への高い学習意欲
  weaknesses:
  - 学歴に強みなし
  - 制御の技術的理解が浅い
  - 実務での技術経験がない
  - 資格未取得
phases:
- id: phase-0
  name: 直前対策期
  start: '2026-03-14'
  end: '2026-04-27'
  priority: p0
  focus:
  - 第一種電気工事士 学科試験
  - GitHub Projects 初期セットアップ
  - Codex / Claude Code 環境構築
  success_criteria:
  - 学科過去問正答率 80% 以上
  - GitHub Projects が稼働している
  - Claude Code の基本操作ができる
- id: phase-1
  name: 実技集中期
  start: '2026-04-28'
  end: '2026-07-04'
  priority: p0
  focus:
  - 第一種電気工事士 実技試験
  - 候補問題13問の完成
  success_criteria:
  - 全13問を40分以内に完成
  - 実技試験合格
- id: phase-2
  name: 制御基礎強化期
  start: '2026-07-05'
  end: '2026-10-31'
  priority: p1
  focus:
  - 制御基礎（リレーシーケンス、自己保持回路、インターロック）
  - 図面読解入門
  - 実務証拠づくり開始
  - Claude Code Academy 開始
  success_criteria:
  - 制御基礎ノート完成
  - 展開接続図の基本記号を識別できる
  - 実務証拠 2件以上
- id: phase-3
  name: PLC / 図面読解強化期
  start: '2026-11-01'
  end: '2027-03-31'
  priority: p1
  focus:
  - PLC 基礎（ラダー図、基本命令）
  - シーケンス制御
  - 図面読解深化
  - 電験三種 段階導入（理論科目入門）
  success_criteria:
  - PLC 課題集 5課題以上
  - 図面読解ノート完成
  - 電験三種 理論の範囲把握
- id: phase-4
  name: 電験三種段階導入期
  start: '2027-04-01'
  end: '2027-09-30'
  priority: p0
  focus:
  - 電験三種（理論 → 電力 → 機械 → 法規）
  - PLC 応用
  - AI 中級活用
  success_criteria:
  - 電験三種 2科目以上の科目合格
  - PLC 応用課題 3課題以上
- id: phase-5
  name: AI スペシャリスト強化期
  start: '2027-10-01'
  end: '2028-01-31'
  priority: p1
  focus:
  - Codex / Claude Code 高度活用
  - 制御 × AI 適用事例構築
  - ポートフォリオ構築
  - 転職準備開始
  success_criteria:
  - AI 活用事例 3件以上
  - ポートフォリオ v1 完成
  - 職務経歴書ドラフト完成
- id: phase-6
  name: 転職仕上げ期
  start: '2028-02-01'
  end: '2028-03-31'
  priority: p0
  focus:
  - 転職活動本格化
  - 面接対策
  - 内定獲得
  success_criteria:
  - 内定獲得
  - 全成果物の最終整備完了
epics:
- id: E-LIC
  name: License
  description: 資格取得（第一種電気工事士、電験三種）
  labels:
  - area:license
  priority: p0
- id: E-CTL
  name: Control Foundation
  description: 制御基礎の学習（リレーシーケンス、自己保持回路、インターロック、タイマー回路）
  labels:
  - area:control
  priority: p1
- id: E-DRW
  name: Drawing Reading
  description: 制御図面読解（展開接続図、単線結線図、記号、読解スキル）
  labels:
  - area:drawings
  priority: p1
- id: E-PLC
  name: PLC Growth
  description: PLC / シーケンス制御の学習（ラダー図、基本命令、シミュレータ実習）
  labels:
  - area:plc
  priority: p1
- id: E-EVD
  name: Evidence Building
  description: 実務証拠の構築（技術メモ、現場同行、仕様整理、社内改善）
  labels:
  - area:evidence
  priority: p1
- id: E-AI
  name: AI Specialist
  description: AI 学習・武器化（Codex / Claude Code / Claude Code Academy）
  labels:
  - area:ai
  priority: p1
- id: E-SEC
  name: OT / ICS Security
  description: OT / ICS セキュリティを最小トラックで学び、制御・PLC・AI の成果物へ接続する
  labels:
  - area:security
  priority: p2
- id: E-CAR
  name: Career Preparation
  description: 転職準備（職務経歴書、面接対策、ポートフォリオ、転職エージェント）
  labels:
  - area:career
  priority: p1
milestones:
- id: M-2026-Q1
  title: '2026 Q1: 計画始動'
  start: '2026-03-14'
  end: '2026-03-31'
  goal: 計画基盤構築、GitHub Projects 初期セットアップ
- id: M-2026-Q2
  title: '2026 Q2: 資格取得'
  start: '2026-04-01'
  end: '2026-06-30'
  goal: 第一種電気工事士 学科合格 + 実技準備完了
- id: M-2026-Q3
  title: '2026 Q3: 制御基礎'
  start: '2026-07-01'
  end: '2026-09-30'
  goal: 実技合格 + 制御基礎ノート完成 + 図面読解入門
- id: M-2026-Q4
  title: '2026 Q4: 制御 + PLC 入門'
  start: '2026-10-01'
  end: '2026-12-31'
  goal: PLC 基礎習得 + 電験三種教材選定
- id: M-2027-Q1
  title: '2027 Q1: PLC + 電験開始'
  start: '2027-01-01'
  end: '2027-03-31'
  goal: PLC 課題集完成 + 図面読解ノート完成 + 電験理論着手
- id: M-2027-Q2
  title: '2027 Q2: 電験本格化'
  start: '2027-04-01'
  end: '2027-06-30'
  goal: 電験 理論・電力の過去問演習 + PLC 応用
- id: M-2027-Q3
  title: '2027 Q3: 電験受験'
  start: '2027-07-01'
  end: '2027-09-30'
  goal: 電験三種受験 + AI 実務適用開始
- id: M-2027-Q4
  title: '2027 Q4: AI 強化'
  start: '2027-10-01'
  end: '2027-12-31'
  goal: AI スペシャリスト + ポートフォリオ + 転職準備
- id: M-2028-Q1
  title: '2028 Q1: 転職仕上げ'
  start: '2028-01-01'
  end: '2028-03-31'
  goal: 内定獲得

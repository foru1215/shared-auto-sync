issue_blueprints:
  steps_exam_study: &id001
  - 対象範囲と教材を確定する。
  - 演習して得点・時間・弱点を記録する。
  - 次回の補強テーマを決める。
  deliverables_exam_study: &id002
  - 学習ログ
  - 弱点メモ
  evidence_exam_study: &id003
  - Issueコメントの進捗記録
  - 正答率または到達度の記録
  dod_exam_study: &id004
  - 対象範囲の全問を解答し、正答率が数値で記録されている。
  - 弱点と次回の補強テーマが Issue に記録されている。
  steps_exam_sit: &id013
  - 受験票・会場・持ち物・移動計画を確認する。
  - 試験を受けて直後の手応えを記録する。
  - 結果確認後の次アクションを整理する。
  deliverables_exam_sit: &id014
  - 受験記録
  - 振り返りメモ
  evidence_exam_sit: &id015
  - Issueコメントの受験記録
  - 合否または手応えの記録
  dod_exam_sit: &id016
  - 受験日・会場・手応えが Issue に記録されている。
  - 自己採点結果と次フェーズへの移行判断が記録されている。
  steps_setup: &id005
  - 必要なツール、設定、権限を洗い出す。
  - セットアップを実施し、基本操作を確認する。
  - 再現手順と詰まりどころを記録する。
  deliverables_setup: &id006
  - セットアップ手順メモ
  - 動作確認結果
  evidence_setup: &id007
  - 設定内容の記録
  - 動作確認のスクリーンショット
  dod_setup: &id008
  - ツールが動作確認済みで、基本操作を1回以上実行している。
  - 再現手順と詰まりどころが Issue に記録されている。
  steps_study: &id021
  - 対象章・図面・用語の範囲を整理する。
  - 要点と判断根拠をノート化する。
  - 未理解点と次の演習対象を明確にする。
  deliverables_study: &id022
  - 学習ノート
  - 要点まとめ
  evidence_study: &id023
  - Issueコメントの進捗記録
  - ノート保存先のリンク
  dod_study: &id024
  - 対象範囲の要点が箇条書きでノートに記録されている。
  - 未理解点リストと次回の学習範囲が Issue に記録されている。
  steps_plc: &id025
  - 対象命令や課題の要件を整理する。
  - ラダーやシミュレーションで動作確認する。
  - 成果物と改善点を次回に引き継げる形で残す。
  deliverables_plc: &id026
  - PLC成果物
  - 動作確認メモ
  evidence_plc: &id027
  - コードまたは設定の保存先リンク
  - 動作確認結果の記録
  dod_plc: &id028
  - ラダープログラムがシミュレーションで期待通り動作している。
  - コードと動作確認結果が保存され、次回参照できる状態になっている。
  steps_evidence: &id009
  - 対象資料や実務テーマを1件選ぶ。
  - 技術観点で読み解き、要点を整理する。
  - 面接や実務説明に使える形で残す。
  deliverables_evidence: &id010
  - 技術メモ
  - 成果要約
  evidence_evidence: &id011
  - Issueコメントの進捗記録
  - 成果物の保存先リンク
  dod_evidence: &id012
  - 技術メモが1件以上完成し、面接で説明できる形になっている。
  - 成果物の保存先リンクが Issue に記録されている。
  steps_ai: &id017
  - 対象教材または事例のゴールを明確にする。
  - 演習や実装を進めて使える知見を抜き出す。
  - 業務や学習への転用方法を記録する。
  deliverables_ai: &id018
  - 学習ログ
  - 転用アイデアメモ
  evidence_ai: &id019
  - Issueコメントの進捗記録
  - 再利用できるプロンプトや手順
  dod_ai: &id020
  - 教材の対象範囲を完了し、成果物が1つ以上ある。
  - 業務または学習に転用できる具体的な知見が Issue に記録されている。
  steps_deliverable: &id029
  - 載せる成果物と見せ方を決める。
  - 説明文、デモ、構成を整える。
  - 第三者に伝わる状態まで仕上げる。
  deliverables_deliverable: &id030
  - 公開可能な成果物
  - 説明用メモ
  evidence_deliverable: &id031
  - 公開URLまたはリポジトリURL
  - 画面キャプチャまたはデモ記録
  dod_deliverable: &id032
  - 第三者に見せられる成果物が完成している。
  - 説明用の要点とリンクが Issue に残っている。
  steps_career: &id033
  - 転職で使う材料と対象企業を整理する。
  - 資料作成または面談準備を進める。
  - 反応と改善点を記録して次回に反映する。
  deliverables_career: &id034
  - 応募資料ドラフト
  - 面談・面接記録
  evidence_career: &id035
  - 応募資料の保存先リンク
  - 面談や面接の振り返りメモ
  dod_career: &id036
  - 最新版の応募資料が保存され、バージョンと日付が Issue に記録されている。
  - 改善点と次アクションが Issue に記録されている。
  steps_review: &id037
  - 完了・未完了・保留中のタスクを棚卸しする。
  - 数字で進捗を記録し、ズレた理由を言語化する。
  - 次の期間で最重要の3件を決める。
  deliverables_review: &id038
  - レビュー記録
  - 次回の優先タスク一覧
  evidence_review: &id039
  - Issueコメントのレビュー記録
  - 次期間の優先順位メモ
  dod_review: &id040
  - 進捗と未完理由が記録されている。
  - 次の最優先タスクが3件以内で決まっている。
  review_note_exam: レビュー時に正答率、練習量、弱点、次回補強テーマを更新する。
  review_note_setup: レビュー時に手順、詰まりどころ、再現方法を更新する。
  review_note_study: レビュー時に未理解点、ノート完成度、次回演習対象を更新する。
  review_note_plc: レビュー時に動作確認結果、再利用ポイント、次回課題を更新する。
  review_note_evidence: レビュー時に残した証拠、公開可否、面接接続ポイントを更新する。
  review_note_ai: レビュー時に再利用可能な知見、デモ性、転用先を更新する。
  review_note_career: レビュー時に応募先ごとの差分、反応、改善点を更新する。
  review_note_review: レビュー完了時に進捗、未完理由、次の最優先3件を記録する。

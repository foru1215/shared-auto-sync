name: 今日のタスク通知

# 毎朝6:00 JST（21:00 UTC）に今日やるべきタスクを Issue で通知
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 今日のタスクを Issue に作成
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            // ── JST 日付 ──────────────────────────────────────────────
            const now = new Date();
            const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
            const yyyy = jst.getUTCFullYear();
            const mm   = String(jst.getUTCMonth() + 1).padStart(2, '0');
            const dd   = String(jst.getUTCDate()).padStart(2, '0');
            const todayStr = `${yyyy}-${mm}-${dd}`;
            const dayName  = ['日','月','火','水','木','金','土'][jst.getUTCDay()];
            const today    = new Date(`${todayStr}T00:00:00`);
            const notificationRecipient = context.repo.owner;

            // ── 前日の通知 Issue を Close ────────────────────────────
            const oldIssues = await github.rest.issues.listForRepo({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              state:    'open',
              labels:   'daily-notify',
              per_page: 20,
            });
            for (const issue of oldIssues.data) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
              });
            }

            // ── 全 Open Issue を取得（最大 300 件）─────────────────────
            let allIssues = [];
            for (let page = 1; page <= 3; page++) {
              const res = await github.rest.issues.listForRepo({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'open',
                per_page: 100,
                page,
              });
              allIssues = allIssues.concat(res.data);
              if (res.data.length < 100) break;
            }

            // ── 今日が実施範囲の Issue を抽出 ────────────────────────
            // ボディ内の「- 期間: YYYY-MM-DD 〜 YYYY-MM-DD」を解析
            const tasks = [];

            for (const issue of allIssues) {
              // daily-notify ラベル自身はスキップ
              if (issue.labels.some(l => l.name === 'daily-notify')) continue;

              const body = issue.body || '';

              // 期間行を取得
              const periodMatch = body.match(/- 期間: (\d{4}-\d{2}-\d{2}) 〜 (\d{4}-\d{2}-\d{2})/);
              if (!periodMatch) continue;

              const startDate = new Date(`${periodMatch[1]}T00:00:00`);
              const endDate   = new Date(`${periodMatch[2]}T00:00:00`);
              if (today < startDate || today > endDate) continue;

              // 実行メモ（朝/昼/夕）を抽出
              const memos = [];
              for (const line of body.split('\n')) {
                const m = line.match(/^- 実行メモ: (.+)$/);
                if (m) memos.push(m[1].trim());
              }

              tasks.push({
                number: issue.number,
                title:  issue.title,
                memos,
              });
            }

            if (tasks.length === 0) {
              console.log('今日の対象タスクなし');
              return;
            }

            tasks.sort((a, b) => a.number - b.number);

            // ── Issue 本文を構築 ────────────────────────────────────
            let body = `## ☀️ ${yyyy}/${mm}/${dd}（${dayName}）のタスク\n\n`;
            body += `@${notificationRecipient} 今日のタスク通知です。\n\n`;
            body += `**${tasks.length}件** が本日の実施範囲です。WIP 上限3つを守って進めよう。\n\n---\n\n`;

            for (const t of tasks) {
              body += `### #${t.number} ${t.title}\n\n`;
              if (t.memos.length > 0) {
                for (const memo of t.memos) {
                  body += `> ${memo}\n`;
                }
              } else {
                body += `> *(実行メモなし)*\n`;
              }
              body += '\n';
            }

            body += `---\n💡 完了したら Issue を **完了** に更新してください。\n`;

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `[今日のタスク] ${yyyy}/${mm}/${dd}（${dayName}）`,
              body,
              assignees: [notificationRecipient],
              labels: ['daily-notify'],
            });

            console.log(`通知 Issue 作成完了（${tasks.length}件）`);

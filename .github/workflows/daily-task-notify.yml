name: 今日のタスク通知

# 毎朝6:00 JST（21:00 UTC）に「今日の主タスク」だけを通知する
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RECIPIENT: ${{ github.repository_owner }}
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 通知生成に必要な依存を入れる
        run: python -m pip install PyYAML

      - name: 前日の通知 Issue を閉じる
        shell: bash
        run: |
          gh issue list --repo "$REPO" --label daily-notify --state open --limit 20 --json number --jq '.[].number' |
          while read -r issue_number; do
            if [ -n "$issue_number" ]; then
              gh issue close "$issue_number" --repo "$REPO"
            fi
          done

      - name: 今日の主タスク通知を生成
        run: |
          python scripts/daily_task_notification.py \
            --repo "$REPO" \
            --recipient "$RECIPIENT" \
            --seed-path "data/project-seed.yaml" \
            --title-path ".daily-task-title.txt" \
            --body-path ".daily-task-body.md"

      - name: 今日の主タスク Issue を作成
        shell: bash
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "$(cat .daily-task-title.txt)" \
            --body-file ".daily-task-body.md" \
            --label "daily-notify" \
            --assignee "$RECIPIENT"
